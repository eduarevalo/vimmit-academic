<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ tenant_name | default('ASEDER') }}{% endblock %}</title>
    <style>
        body {
            background-color: #f4f4f5;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        .wrapper {
            background-color: #f4f4f5;
            padding: 40px 0;
            width: 100%;
        }
        .container {
            background-color: #ffffff;
            border: 1px solid #e4e4e7;
            margin: 0 auto;
            max-width: 600px;
            width: 100%;
        }
        .header {
            padding: 30px 0 10px;
            text-align: center;
        }
        .logo-box {
            background-color: #2cae65;
            border-radius: 4px;
            display: inline-block;
            height: 24px;
            vertical-align: middle;
            width: 24px;
        }
        .logo-text {
            color: #18181b;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-left: 8px;
            vertical-align: middle;
        }
        .content {
            color: #52525b;
            font-size: 16px;
            line-height: 24px;
            padding: 40px;
        }
        .footer {
            color: #71717a;
            font-size: 12px;
            margin: 0 auto;
            max-width: 600px;
            padding: 20px;
            text-align: center;
        }
        .button {
            border-radius: 2px !important;
            color: #ffffff !important;
            display: inline-block;
            font-size: 16px;
            font-weight: 600;
            line-height: 50px;
            margin: 20px 0;
            text-align: center;
            text-decoration: none;
            width: 200px;
        }
        .button-primary {
            background-color: #2cae65;
        }
        .button-secondary {
            background-color: #4f46e5;
        }
        h1 {
            color: #18181b;
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 20px;
        }
        hr {
            border: 0;
            border-top: 1px solid #e4e4e7;
            margin: 30px 0;
        }
        .info-box {
            background-color: #f8fafc;
            border-left: 4px solid #bbbbbb;
            border-radius: 2px;
            margin: 20px 0;
            padding: 24px;
        }
        .info-box-blue {
            border-left-color: #4f46e5;
        }
        .info-label {
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            margin: 0;
            text-transform: uppercase;
        }
        .info-value {
            color: #1e293b;
            font-size: 18px;
            font-weight: 700;
            margin: 4px 0 12px;
        }
        .info-value-large {
            color: #18181b;
            font-size: 32px;
            font-weight: 800;
            margin: 4px 0 0;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <table align="center" role="presentation" cellSpacing="0" cellPadding="0" border="0" width="600" class="container">
            <tr>
                <td class="header">
                    <div class="logo-box"></div>
                    <span class="logo-text">ASEDER</span>
                </td>
            </tr>
            <tr>
                <td class="content">
                    {% block content %}{% endblock %}
                </td>
            </tr>
        </table>
        <div class="footer">
            &copy; {{ current_year | default('2026') }} {{ tenant_name | default('ASEDER') }}. Todos los derechos reservados.
            <br>
            Has recibido este correo porque estás registrado en nuestra plataforma.
        </div>
    </div>
</body>
</html>

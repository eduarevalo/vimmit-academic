name: Deploy to DigitalOcean

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python
        run: uv python install

      - name: Run Backend Tests
        working-directory: ./backend
        run: |
          uv sync
          PYTHONPATH=src uv run pytest

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run Frontend Unit Tests
        working-directory: ./frontend
        run: npm run test:coverage

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install chromium --with-deps

      - name: Build Frontend (for preview server)
        working-directory: ./frontend
        run: npm run build

      - name: Run E2E Tests (with mocked API)
        working-directory: ./frontend
        env:
          CI: true
          VITE_API_URL: http://localhost:8000
        run: npm run test:bdd

      - name: Upload E2E Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  terraform-deploy:
    name: Terraform Apply
    needs: [test-backend, test-frontend, test-e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Download Terraform State
        uses: actions/checkout@v4
        with:
          ref: terraform-state
          path: state-repo
        continue-on-error: true # Might fail if branch doesn't exist yet

      - name: Prepare Terraform State
        working-directory: ./infra
        run: |
          if [ -f ../state-repo/terraform.tfstate ]; then
            cp ../state-repo/terraform.tfstate .
          fi

      - name: Terraform Init
        working-directory: ./infra
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: ./infra
        run: |
          set +e
          terraform plan \
            -detailed-exitcode \
            -var "do_token=${{ secrets.DIGITALOCEAN_TOKEN }}" \
            -var "zeptomail_token=${{ secrets.ZEPTOMAIL_TOKEN }}" \
            -var "zeptomail_smtp_user=${{ secrets.ZEPTOMAIL_SMTP_USER }}" \
            -var "spaces_access_id=${{ secrets.SPACES_ACCESS_ID }}" \
            -var "spaces_secret_key=${{ secrets.SPACES_SECRET_KEY }}" \
            -var "db_password=${{ secrets.MYSQL_DB_PASSWORD }}" \
            -out=tfplan
          exitcode=$?
          set -e

          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT

          if [ $exitcode -eq 1 ]; then
            echo "Terraform plan failed"
            exit 1
          fi

      - name: Terraform Apply
        if: steps.plan.outputs.exitcode == '2'
        working-directory: ./infra
        run: terraform apply -auto-approve tfplan

      - name: Persist Terraform State
        if: always()
        run: |
          mkdir -p state-repo
          cp infra/terraform.tfstate state-repo/ || echo "No state file to copy"
          cd state-repo
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Initialize git if not already in state-repo (in case checkout failed)
          if [ ! -d ".git" ]; then
            git init
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          fi
          
          git add terraform.tfstate
          git commit -m "Update terraform state [skip ci]" || echo "No changes to state"
          git push origin HEAD:terraform-state --force
